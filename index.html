const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "strongThreshold": 80,
  "conditionalThreshold": 50,
  "concurrency": 3,
  "passBand": "conditional"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const [checklistData, setChecklistData] = useState(DEFAULT_CHECKLIST_DATA);
  const [evalCategory, setEvalCategory] = useState('__all__');
  const evalCategoryRef = useRef('__all__');
  const checklistDataRef = useRef(DEFAULT_CHECKLIST_DATA);
  useEffect(() => { evalCategoryRef.current = evalCategory; }, [evalCategory]);
  useEffect(() => { checklistDataRef.current = checklistData; }, [checklistData]);
  const [docs, setDocs] = useState([]); // {id, name, text, applicantName, status, results, error, scored}
  const [phase, setPhase] = useState('idle'); // idle | running | done
  const [view, setView] = useState('input'); // input | dashboard
  const [activeDocId, setActiveDocId] = useState(null);
  const [globalError, setGlobalError] = useState('');

  const thresholds = useMemo(() => ({
    strong: Math.max(Number(t.strongThreshold) || 80, Number(t.conditionalThreshold) || 50),
    conditional: Math.min(Number(t.conditionalThreshold) || 50, Number(t.strongThreshold) || 80),
  }), [t.strongThreshold, t.conditionalThreshold]);

  // Re-score whenever thresholds change
  const scoredDocs = useMemo(() => {
    return docs.map(d => {
      if (d.status === 'done' && d.results) {
        return { ...d, scored: scoreResults(d.results, thresholds) };
      }
      return d;
    });
  }, [docs, thresholds]);

  // Pass band: which bands count as "satisfies criteria"
  // 'strong' = only strong passes; 'conditional' = strong + conditional pass
  const passBand = t.passBand === 'strong' ? 'strong' : 'conditional';

  const summary = useMemo(() => {
    const total = scoredDocs.length;
    let strong = 0, conditional = 0, reject = 0, errored = 0, pending = 0;
    for (const d of scoredDocs) {
      if (d.status === 'error') errored++;
      else if (d.status !== 'done') pending++;
      else if (d.scored?.band === 'strong') strong++;
      else if (d.scored?.band === 'conditional') conditional++;
      else reject++;
    }
    const pass = passBand === 'strong' ? strong : strong + conditional;
    const fail = reject;
    return { total, strong, conditional, reject, errored, pending, pass, fail };
  }, [scoredDocs, passBand]);

  // ── File handling ─────────────────────────────────────────────────
  const addFiles = useCallback(async (fileList) => {
    setGlobalError('');
    const arr = Array.from(fileList || []);
    if (!arr.length) return;
    const prepared = [];
    const errs = [];
    for (const f of arr) {
      try {
        const text = await parseFile(f);
        prepared.push({
          id: `${f.name}-${f.size}-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
          name: f.name,
          text,
          applicantName: extractApplicantName(text, f.name.replace(/\.[^.]+$/, '')),
          status: 'queued',
          results: null,
          error: null,
        });
      } catch (e) {
        errs.push(e.message || String(e));
      }
    }
    if (errs.length) setGlobalError(errs.join(' · '));
    if (prepared.length) setDocs(prev => [...prev, ...prepared]);
  }, []);

  const generateDemoBatch = useCallback((n = 100) => {
    const sectors = ['Agro-processing','Logistics','Retail','Manufacturing','ICT services','Hospitality','Healthcare','Construction','Education','Wholesale','Tailoring','Bakery'];
    const firstNames = ['Jane','Samuel','Aisha','Kwame','Fatima','David','Grace','John','Amina','Peter','Lucy','Daniel','Mary','Joseph','Rose'];
    const lastNames = ['Mwangi','Otieno','Adeyemi','Mensah','Kone','Banda','Diallo','Okoye','Sibanda','Achieng','Wamala','Nakato','Ngugi'];
    const surnames = ['Foods','Logistics','Traders','Industries','Holdings','Ventures','Enterprises','Group','Solutions','Partners','Works','Co'];
    const adjectives = ['Harvest','Bluepeak','Sunrise','Highland','Riverside','Greenfield','Summit','Pioneer','Oak','Ironwood','Cedar','Beacon','Coastal','Plateau'];
    const rand = (a) => a[Math.floor(Math.random() * a.length)];
    const ri = (lo, hi) => Math.floor(lo + Math.random() * (hi - lo + 1));

    const newDocs = [];
    for (let i = 0; i < n; i++) {
      const tier = Math.random();
      // distribution: 35% strong, 40% borderline, 25% weak
      const profile = tier < 0.35 ? 'strong' : tier < 0.75 ? 'borderline' : 'weak';
      const name = `${rand(adjectives)} ${rand(surnames)} ${i + 1 < 10 ? '0' : ''}${i + 1}`;
      const sector = rand(sectors);
      const dir1 = `${rand(firstNames)} ${rand(lastNames)}`;
      const dir2 = `${rand(firstNames)} ${rand(lastNames)}`;

      let text;
      if (profile === 'strong') {
        const turnover = ri(800, 4500) * 1000;
        const margin = (8 + Math.random() * 7).toFixed(1);
        const profit = Math.round(turnover * margin / 100);
        const de = (0.4 + Math.random() * 0.9).toFixed(2);
        const dscr = (1.4 + Math.random() * 0.6).toFixed(2);
        const loan = ri(150, 800) * 1000;
        const collat = Math.round(loan * (1.4 + Math.random() * 0.6));
        text = `APPLICANT: ${name}
Sector: ${sector} | Operating since: ${ri(2017, 2022)} (${ri(3, 8)} years trading history)
FY2024 Turnover: USD ${turnover.toLocaleString()} | FY2023 Turnover: USD ${Math.round(turnover * 0.85).toLocaleString()}
FY2024 Net profit: USD ${profit.toLocaleString()} (margin ${margin}%)
Debt-to-equity: ${de}x
Audited statements: Yes — independent auditor, FY2023 and FY2024 attached.
Loan request: USD ${loan.toLocaleString()} | Tenor: ${ri(36, 60)} months | Purpose: capex / expansion of ${sector.toLowerCase()} operations.
Projected DSCR: ${dscr}x. Cash-flow forecast attached.
Collateral: First charge over property, independent valuation USD ${collat.toLocaleString()}.
KYC: Director ${dir1} — ID, utility bill, tax registration. Director ${dir2} — ID, utility bill, tax registration.
Credit history: CRB clean. No defaults or restructurings in last 36 months.
Regulatory: All sector licences current and valid.
ESG: Employs ${ri(20, 80)} people; community sourcing programme; renewable energy installed.`;
      } else if (profile === 'borderline') {
        const turnover = ri(180, 700) * 1000;
        const margin = (1 + Math.random() * 4).toFixed(1);
        const profit = Math.round(turnover * margin / 100);
        const de = (1.4 + Math.random() * 1.0).toFixed(2);
        const loan = ri(80, 250) * 1000;
        text = `APPLICANT: ${name}
Sector: ${sector} | Operating since: ${ri(2022, 2023)} (${ri(2, 3)} years)
Turnover FY2024: USD ${turnover.toLocaleString()}
Net profit FY2024: USD ${profit.toLocaleString()} (margin ${margin}%)
Prior year financials: management-prepared only, not audited.
Debt-to-equity: ${de}x
Loan request: USD ${loan.toLocaleString()} for working capital.
Repayment tenor: ${ri(24, 36)} months. DSCR not explicitly modelled.
Collateral: equipment offered, owner-estimated value USD ${Math.round(loan * 0.6).toLocaleString()} (no independent valuation).
KYC: Director ${dir1} — ID provided. Proof of address not attached. Tax PIN provided.
Credit history: One restructured facility in 2024, now current.
Licensing: current.
ESG: not addressed.`;
      } else {
        const turnover = ri(20, 180) * 1000;
        const loan = ri(100, 400) * 1000;
        text = `APPLICANT: ${name}
Sector: ${sector} | Operating since: ${ri(2024, 2025)} (~${ri(8, 16)} months)
Turnover: approximately USD ${turnover.toLocaleString()} (self-reported, no statements attached).
No audited or management accounts provided.
Loan request: USD ${loan.toLocaleString()}. Purpose described as "business growth".
No repayment schedule or cash-flow projection submitted.
No collateral offered.
KYC: Director ${dir1} — ID only. No proof of address, no tax registration.
CRB: shows ${ri(1, 2)} unresolved default(s) with digital lender(s) in 2025.
No mention of licensing or ESG.`;
      }

      newDocs.push({
        id: `demo-${Date.now()}-${i}`,
        name: `${name.replace(/\s+/g, '_')}.txt`,
        text,
        applicantName: name,
        status: 'queued',
        results: null,
        error: null,
      });
    }
    setDocs(newDocs);
    setGlobalError('');
  }, []);

  const removeDoc = (id) => setDocs(prev => prev.filter(d => d.id !== id));

  const updateDoc = useCallback((idx, patch) => {
    setDocs(prev => {
      const next = prev.slice();
      if (next[idx]) next[idx] = { ...next[idx], ...patch };
      return next;
    });
  }, []);

  const runAll = async () => {
    if (!docs.length) { setGlobalError('Add some documents first.'); return; }
    const currentCategory = evalCategoryRef.current;
    const currentChecklist = checklistDataRef.current;
    const checklistText = checklistToText(currentChecklist, currentCategory);
    if (!checklistText.trim()) { setGlobalError('Select a category with at least one checklist item.'); return; }
    setGlobalError('');
    setPhase('running');
    setView('dashboard');
    // mark all queued as queued (reset)
    setDocs(prev => prev.map(d => ({ ...d, status: 'queued', results: null, error: null })));

    // Snapshot for batch — but we need the latest list
    const snapshot = docs.map(d => ({ id: d.id, text: d.text }));

    await evaluateBatch(checklistText, snapshot, {
      concurrency: Math.max(1, Math.min(10, Number(t.concurrency) || 3)),
      onUpdate: (idx, info) => {
        if (info.status === 'running') {
          updateDoc(idx, { status: 'running' });
        } else if (info.status === 'done') {
          updateDoc(idx, { status: 'done', results: info.results });
        } else if (info.status === 'error') {
          updateDoc(idx, { status: 'error', error: info.error });
        }
      }
    });
    setPhase('done');
  };

  const wipe = () => {
    if (!confirm('Clear all uploaded documents and results from this session? This cannot be undone.')) return;
    setDocs([]);
    setPhase('idle');
    setGlobalError('');
    setView('input');
  };

  const activeDoc = activeDocId ? scoredDocs.find(d => d.id === activeDocId) : null;

  return (
    <div className="app">
      <TopBar
        view={view}
        setView={setView}
        hasDocs={docs.length > 0}
        onWipe={wipe}
      />

      {view === 'input' && (
        <InputView
          checklistData={checklistData} setChecklistData={setChecklistData}
          evalCategory={evalCategory} setEvalCategory={setEvalCategory}
          docs={docs}
          addFiles={addFiles}
          removeDoc={removeDoc}
          generateDemoBatch={generateDemoBatch}
          phase={phase} runAll={runAll}
          error={globalError}
        />
      )}

      {view === 'dashboard' && (
        <DashboardView
          docs={scoredDocs}
          summary={summary}
          phase={phase}
          thresholds={thresholds}
          passBand={passBand}
          checklistLength={checklistToText(checklistData, evalCategory).split(/\n+/).map(s => s.trim()).filter(Boolean).length}
          onSelectDoc={(id) => setActiveDocId(id)}
          onBack={() => setView('input')}
        />
      )}

      {activeDoc && (
        <DocDetail
          doc={activeDoc}
          onClose={() => setActiveDocId(null)}
        />
      )}

      <TweaksPanel>
        <TweakSection label="Approval thresholds" />
        <TweakSlider label="Strong approval ≥" value={t.strongThreshold} min={50} max={95} step={1} unit="%"
                     onChange={(v) => setTweak('strongThreshold', v)} />
        <TweakSlider label="Conditional ≥" value={t.conditionalThreshold} min={20} max={75} step={1} unit="%"
                     onChange={(v) => setTweak('conditionalThreshold', v)} />
        <TweakSection label="Pass criterion" />
        <TweakRadio label='"Satisfies criteria" =' value={t.passBand}
                    options={['strong', 'conditional']}
                    onChange={(v) => setTweak('passBand', v)} />
        <TweakSection label="Performance" />
        <TweakSlider label="Concurrent evals" value={t.concurrency} min={1} max={8} step={1}
                     onChange={(v) => setTweak('concurrency', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  </script>
</body>
</html>
