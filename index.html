<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EDL Review — Internal audit evaluation tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <style>
/* EDL — modern fintech, restrained palette */

:root {
  --bg: #F7F8FA;
  --surface: #FFFFFF;
  --surface-2: #FAFBFC;
  --ink: #0F1A2B;
  --ink-2: #2A3346;
  --muted: #6B7385;
  --muted-2: #9AA3B2;
  --line: #E5E8EE;
  --line-2: #EEF0F4;
  --accent: #1E4FE0;
  --accent-soft: #EDF1FE;
  --green: #2E9461;
  --green-soft: #E7F2EC;
  --amber: #C28A1B;
  --amber-soft: #FBF1DC;
  --red: #C04646;
  --red-soft: #F7E4E4;
  --shadow-1: 0 1px 2px rgba(15, 26, 43, .04), 0 1px 0 rgba(15, 26, 43, .02);
  --shadow-2: 0 1px 2px rgba(15, 26, 43, .04), 0 8px 24px rgba(15, 26, 43, .06);
  --radius: 12px;
}

* { box-sizing: border-box; }
html, body { margin: 0; background: var(--bg); color: var(--ink); }
body {
  font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "ss01", "cv11";
  letter-spacing: -0.005em;
}

#root { min-height: 100vh; }

.app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Top bar ───────────────────────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 14px 28px;
  background: var(--surface);
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  z-index: 50;
}
.brand { display: flex; align-items: center; gap: 11px; }
.brand-mark {
  width: 34px; height: 34px;
  background: var(--ink);
  color: white;
  display: grid; place-items: center;
  border-radius: 9px;
}
.brand-text { line-height: 1.15; }
.brand-name { font-weight: 600; font-size: 14px; letter-spacing: -0.01em; }
.brand-sub { font-size: 11.5px; color: var(--muted); }

.seg {
  display: inline-flex;
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: 9px;
  padding: 3px;
  margin: 0 auto 0 8px;
}
.seg button {
  appearance: none; border: 0; background: transparent;
  font: inherit; font-size: 12.5px; font-weight: 500;
  color: var(--muted);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  transition: all .15s ease;
}
.seg button.on {
  background: var(--surface);
  color: var(--ink);
  box-shadow: var(--shadow-1);
}
.seg button:disabled { opacity: 0.45; cursor: not-allowed; }

.topbar-right { display: flex; align-items: center; gap: 10px; }
.conf-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11.5px; font-weight: 500;
  color: var(--green);
  background: var(--green-soft);
  border-radius: 6px;
  padding: 5px 9px;
}
.ghost-btn {
  appearance: none; background: transparent;
  border: 1px solid var(--line);
  font: inherit; font-size: 12.5px; font-weight: 500;
  color: var(--ink-2);
  padding: 6px 12px;
  border-radius: 7px;
  cursor: pointer;
  transition: all .15s ease;
}
.ghost-btn:hover { background: var(--surface-2); border-color: var(--muted-2); }

/* ── Page ──────────────────────────────────────────────── */
.page {
  max-width: 1180px;
  width: 100%;
  margin: 0 auto;
  padding: 32px 28px 80px;
  flex: 1;
}
.page-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 24px;
  margin-bottom: 20px;
}
.page-head h1 {
  font-size: 26px; font-weight: 600; letter-spacing: -0.02em;
  margin: 0 0 6px;
}
.lede { color: var(--muted); margin: 0; font-size: 13.5px; max-width: 64ch; line-height: 1.55; }
.lede .muted { color: var(--muted-2); }

.layout-toggle {
  display: inline-flex;
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 3px;
  flex-shrink: 0;
}
.layout-toggle button {
  appearance: none; border: 0; background: transparent;
  font: inherit; font-size: 12px; font-weight: 500;
  color: var(--muted);
  padding: 5px 12px;
  border-radius: 5px;
  cursor: pointer;
}
.layout-toggle button.on { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-1); }

/* ── Cards ─────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow-1);
}

/* ── Input view ────────────────────────────────────────── */
.io-grid {
  display: grid;
  gap: 16px;
  grid-template-columns: 1fr 1fr;
}
.io-grid.split { grid-template-columns: 1fr 1fr; }
.io-grid.stacked { grid-template-columns: 1fr; }

/* ── Dropzone ──────────────────────────────────────────── */
.dropzone {
  border: 1.5px dashed var(--line);
  border-radius: 10px;
  background: var(--surface-2);
  padding: 28px 20px;
  text-align: center;
  cursor: pointer;
  color: var(--muted);
  transition: all .15s ease;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.dropzone:hover, .dropzone.over {
  border-color: var(--accent);
  background: var(--accent-soft);
  color: var(--accent);
}
.dz-title { font-size: 13px; font-weight: 500; color: var(--ink); }
.dropzone:hover .dz-title, .dropzone.over .dz-title { color: var(--accent); }
.dz-sub { font-size: 11.5px; color: var(--muted); }

.file-list {
  display: flex; flex-direction: column;
  gap: 6px;
  max-height: 240px;
  overflow-y: auto;
  padding: 4px 2px;
  border-top: 1px solid var(--line-2);
  margin-top: 4px;
  padding-top: 12px;
}
.file-row {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px;
  border: 1px solid var(--line-2);
  border-radius: 7px;
  background: var(--surface);
  font-size: 12.5px;
}
.file-icon {
  width: 24px; height: 24px;
  display: grid; place-items: center;
  background: var(--accent-soft);
  color: var(--accent);
  border-radius: 6px;
  flex-shrink: 0;
}
.file-meta { flex: 1; min-width: 0; }
.file-name { font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.file-sub { font-size: 11px; color: var(--muted); }
.x-btn {
  appearance: none; border: 0; background: transparent;
  width: 22px; height: 22px;
  border-radius: 5px;
  color: var(--muted-2);
  font-size: 16px; line-height: 1;
  cursor: pointer;
}
.x-btn:hover { background: var(--red-soft); color: var(--red); }

.io-card {
  display: flex; flex-direction: column;
  padding: 20px;
  gap: 14px;
}
.io-card-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 16px;
}
.io-card-eyebrow {
  font-size: 10.5px; font-weight: 600; letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--accent);
}
.io-card-head h2 {
  margin: 4px 0 0; font-size: 16px; font-weight: 600; letter-spacing: -0.01em;
}
.io-meta {
  font-size: 11.5px; color: var(--muted-2);
  font-variant-numeric: tabular-nums;
}

.text-input {
  appearance: none;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface-2);
  padding: 9px 12px;
  font: inherit; font-size: 13px;
  color: var(--ink);
  outline: none;
  transition: all .15s ease;
}
.text-input:focus { border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 3px var(--accent-soft); }

.doc-area {
  appearance: none;
  width: 100%;
  min-height: 280px;
  resize: vertical;
  border: 1px solid var(--line);
  border-radius: 9px;
  background: var(--surface-2);
  padding: 12px 14px;
  font: 12.5px/1.55 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  color: var(--ink-2);
  outline: none;
  transition: all .15s ease;
}
.doc-area:focus { border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 3px var(--accent-soft); }
.checklist-area { min-height: 220px; }

.hint-row {
  display: flex; justify-content: space-between; align-items: center; gap: 12px;
  flex-wrap: wrap;
}
.muted { color: var(--muted); }
.small { font-size: 11.5px; }

.privacy-note {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11.5px; color: var(--muted);
}
.privacy-note svg { color: var(--green); flex-shrink: 0; }

.link-btn {
  appearance: none; background: transparent; border: 0;
  font: inherit; font-size: 11.5px; font-weight: 500;
  color: var(--accent);
  cursor: pointer;
  padding: 0;
}
.link-btn:hover { text-decoration: underline; }

/* ── Run bar ───────────────────────────────────────────── */
.run-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 20px;
  gap: 20px;
}
.run-bar-left { color: var(--muted); }
.error-msg {
  color: var(--red);
  font-size: 12.5px;
  font-weight: 500;
  background: var(--red-soft);
  padding: 6px 12px;
  border-radius: 7px;
}

.primary-btn {
  appearance: none; border: 0;
  background: var(--ink);
  color: white;
  font: inherit; font-size: 13px; font-weight: 500;
  padding: 11px 18px;
  border-radius: 9px;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 8px;
  box-shadow: var(--shadow-1);
  transition: all .15s ease;
}
.primary-btn:hover:not(:disabled) { background: #1a2438; transform: translateY(-1px); box-shadow: var(--shadow-2); }
.primary-btn:disabled { opacity: 0.7; cursor: not-allowed; }
.primary-btn.loading { background: var(--ink-2); }

.spinner {
  width: 13px; height: 13px;
  border: 2px solid rgba(255,255,255,.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Report ────────────────────────────────────────────── */
.report-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
}
.report-actions { display: flex; gap: 8px; }

.report-hero {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 32px;
  padding: 28px 32px;
  margin-bottom: 18px;
}

/* ── Dashboard hero ────────────────────────────────────── */
.dash-hero {
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  gap: 36px;
  padding: 32px 36px;
  margin-bottom: 16px;
}
.hero-headline { display: flex; flex-direction: column; justify-content: center; }
.big-number {
  display: flex;
  align-items: baseline;
  gap: 14px;
  margin: 8px 0 6px;
  font-size: 56px;
  font-weight: 600;
  letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
.big-number .passed { color: var(--green); }
.big-number .of {
  font-size: 20px;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 0;
}
.big-sub {
  font-size: 14px;
  color: var(--ink-2);
  letter-spacing: -0.005em;
}
.big-sub .muted { color: var(--muted); }

.progress-row {
  display: flex; align-items: center; gap: 12px;
  margin-top: 18px;
}
.progress {
  flex: 1;
  height: 5px;
  background: var(--line-2);
  border-radius: 999px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 999px;
  transition: width .35s ease;
}
.progress-label {
  font-size: 11.5px;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}

.hero-bars {
  display: flex; flex-direction: column;
  gap: 12px;
  justify-content: center;
}
.band-bar-row {
  display: grid;
  grid-template-columns: 160px 1fr 36px;
  align-items: center;
  gap: 12px;
  font-size: 12.5px;
}
.band-bar-label {
  display: flex; align-items: center; gap: 8px;
  color: var(--ink-2);
}
.band-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.band-bar-track {
  height: 8px;
  background: var(--line-2);
  border-radius: 999px;
  overflow: hidden;
}
.band-bar-fill {
  height: 100%;
  border-radius: 999px;
  transition: width .5s cubic-bezier(.2,.8,.2,1);
}
.band-bar-count {
  text-align: right;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  color: var(--ink);
}

/* ── Pass/fail counter cards ──────────────────────────── */
.passfail {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  margin-bottom: 18px;
}
.pf-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px 22px;
  box-shadow: var(--shadow-1);
}
.pf-card.pf-pass    { border-top: 3px solid var(--green); }
.pf-card.pf-partial { border-top: 3px solid var(--amber); }
.pf-card.pf-fail    { border-top: 3px solid var(--red); }
.pf-card.pf-meta    { border-top: 3px solid var(--line); }
.pf-num {
  font-size: 36px;
  font-weight: 600;
  letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
.pf-card.pf-pass    .pf-num { color: var(--green); }
.pf-card.pf-partial .pf-num { color: var(--amber); }
.pf-card.pf-fail    .pf-num { color: var(--red); }
.pf-label {
  font-size: 12.5px;
  font-weight: 500;
  margin-top: 8px;
  color: var(--ink-2);
}
.pf-sub {
  font-size: 11.5px;
  color: var(--muted);
  margin-top: 2px;
}

/* ── Bulk table ────────────────────────────────────────── */
.table-tools { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.search-input { width: 180px; height: 30px; }
.filter-seg.compact button { padding: 4px 9px; font-size: 11.5px; }

.bulk-table { border-top: 1px solid var(--line); }
.bulk-row {
  display: grid;
  grid-template-columns: 40px 1.5fr 130px 80px 1.4fr 24px;
  gap: 16px;
  align-items: center;
  padding: 12px 24px;
  border-bottom: 1px solid var(--line-2);
  font-size: 12.5px;
  cursor: pointer;
  transition: background .12s ease;
}
.bulk-row:hover { background: var(--surface-2); }
.bulk-row:last-child { border-bottom: 0; }
.bulk-row.error .bn-title { color: var(--red); }
.bulk-row.bulk-head {
  background: var(--surface-2);
  font-size: 10.5px; font-weight: 600; letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--muted);
  cursor: default;
  padding-top: 11px; padding-bottom: 11px;
}
.bulk-row.bulk-head:hover { background: var(--surface-2); }
.b-i { color: var(--muted-2); font-variant-numeric: tabular-nums; font-weight: 500; }
.bn-title { color: var(--ink); font-weight: 500; }
.bn-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
.sortable { cursor: pointer; user-select: none; }
.sortable:hover { color: var(--ink); }
.score-num { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
.score-pct { font-size: 11px; color: var(--muted); margin-left: 1px; }
.b-action { color: var(--muted-2); text-align: right; font-size: 16px; }

.mini-stack {
  display: flex;
  height: 6px;
  border-radius: 999px;
  overflow: hidden;
  background: var(--line-2);
  margin-bottom: 4px;
}
.mini-stack > div { height: 100%; transition: width .3s ease; }
.mini-counts {
  display: flex; gap: 10px;
  font-size: 11px;
  font-variant-numeric: tabular-nums;
  font-weight: 600;
}

.mini-spinner {
  width: 14px; height: 14px;
  border: 2px solid var(--line);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
.error-msg-inline { color: var(--red); font-size: 11.5px; }
.empty-row { padding: 40px; text-align: center; color: var(--muted); font-size: 13px; }

/* ── Detail dive (wider) ───────────────────────────────── */
.dive-wide { width: min(1100px, 100%); max-height: 90vh; }
.detail-summary {
  display: grid;
  grid-template-columns: auto auto 1fr;
  gap: 28px;
  padding: 22px 26px;
  border-bottom: 1px solid var(--line);
  align-items: center;
}
.detail-score { display: flex; flex-direction: column; align-items: flex-start; gap: 8px; }
.ds-num {
  font-size: 44px; font-weight: 600; letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
.ds-num span { font-size: 20px; color: var(--muted); margin-left: 1px; }
.detail-counts { display: flex; gap: 24px; }
.detail-rec { border-left: 3px solid; padding: 0 16px; }

.detail-filter { padding: 14px 26px 0; }
.detail-table { padding: 8px 0 22px; overflow-y: auto; flex: 1; min-height: 0; }
.detail-table .eval-row {
  grid-template-columns: 36px 1.5fr 110px 1.4fr 1.4fr;
  padding: 11px 26px;
  cursor: default;
}
.detail-table .eval-row:hover { background: var(--surface-2); }
.eyebrow {
  font-size: 10.5px; font-weight: 600; letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--accent);
}
.applicant {
  font-size: 28px; font-weight: 600; letter-spacing: -0.02em;
  margin: 6px 0 8px;
}
.hero-meta {
  font-size: 12.5px; color: var(--muted);
  display: flex; gap: 8px; align-items: center;
}
.dotsep { color: var(--muted-2); }

.recommendation {
  margin-top: 22px;
  border-left: 3px solid;
  padding: 4px 16px;
}
.rec-label {
  font-size: 10.5px; font-weight: 600; letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.rec-title {
  font-size: 17px; font-weight: 600; letter-spacing: -0.01em;
  margin-bottom: 8px;
}
.rec-reasoning {
  font-size: 13px; color: var(--ink-2); line-height: 1.55;
  text-wrap: pretty;
}

.hero-right {
  display: flex; flex-direction: column;
  align-items: center;
  gap: 20px;
}
.dial-wrap { position: relative; width: 180px; height: 180px; }
.dial { width: 180px; height: 180px; }
.dial-center {
  position: absolute; inset: 0;
  display: grid; place-items: center;
  text-align: center;
}
.dial-pct {
  font-size: 38px; font-weight: 600; letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
.dial-pct span { font-size: 18px; color: var(--muted); margin-left: 1px; }
.dial-band {
  font-size: 11.5px; font-weight: 600; letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-top: 6px;
}

.stats-row {
  display: flex; gap: 24px;
  width: 100%;
  justify-content: space-around;
}
.stat { text-align: center; }
.stat-label { font-size: 10.5px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.stat-value { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
.stat-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ── Table ─────────────────────────────────────────────── */
.table-card { padding: 0; overflow: hidden; }
.table-head {
  display: flex; justify-content: space-between; align-items: flex-end;
  padding: 22px 24px 16px;
  gap: 16px;
}
.table-head h2 { margin: 0 0 4px; font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }

.filter-seg {
  display: inline-flex;
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 3px;
}
.filter-seg button {
  appearance: none; border: 0; background: transparent;
  font: inherit; font-size: 12px; font-weight: 500;
  color: var(--muted);
  padding: 5px 11px;
  border-radius: 5px;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
}
.filter-seg button.on { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-1); }
.seg-count {
  font-size: 10.5px;
  font-variant-numeric: tabular-nums;
  background: var(--line-2);
  color: var(--ink-2);
  padding: 1px 6px;
  border-radius: 4px;
}
.filter-seg button.on .seg-count { background: var(--accent-soft); color: var(--accent); }

.eval-table {
  border-top: 1px solid var(--line);
}
.eval-row {
  display: grid;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    // Notify parent (Claude Design) we're available
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (_) {}
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) {
    return (
      <button
        className="twk-fab"
        onClick={() => setOpen(true)}
        title="Open settings"
        aria-label="Open settings"
      >
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="3" />
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
      </button>
    );
  }
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {

    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

function RiskBadge({ risk, onChange }) {
  return (
    <select
      className={`risk-select risk-${risk}`}
      value={risk}
      onChange={e => onChange(e.target.value)}
    >

      <option value="Medium">Medium</option>
      <option value="Low">Low</option>
    </select>
  );
}

function ChecklistItem({ item, index, onEdit, onDelete, onRiskChange }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(item.point);
  const inputRef = useRef(null);

  const startEdit = () => {
    setDraft(item.point);
    setEditing(true);
    setTimeout(() => inputRef.current?.focus(), 0);
  };

  const saveEdit = () => {
    const trimmed = draft.trim();
    if (trimmed) { onEdit(item.id, trimmed); }
    setEditing(false);
  };

  const cancelEdit = () => {
    setDraft(item.point);
    setEditing(false);
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveEdit(); }
    if (e.key === 'Escape') cancelEdit();
  };

  return (
    <div className={`cl-item${editing ? ' editing' : ''}`}>
      <div className="cl-item-num">{String(index + 1).padStart(2, '0')}</div>
      <div className="cl-item-body">
        {editing ? (
          <textarea
            ref={inputRef}
            className="cl-item-edit-input"
            value={draft}
            onChange={e => setDraft(e.target.value)}
            onKeyDown={handleKeyDown}
          />
        ) : (
          <div className="cl-item-text">{item.point}</div>
        )}
        <div className="cl-item-meta">
          <RiskBadge risk={item.risk} onChange={v => onRiskChange(item.id, v)} />
        </div>
      </div>
      <div className="cl-item-actions">
        {editing ? (
          <>
            <button className="cl-icon-btn save" title="Save" onClick={saveEdit}>
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
            </button>
            <button className="cl-icon-btn" title="Cancel" onClick={cancelEdit}>
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
          </>
        ) : (
          <>
            <button className="cl-icon-btn edit" title="Edit" onClick={startEdit}>
              <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button className="cl-icon-btn del" title="Delete" onClick={() => onDelete(item.id)}>
              <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
            </button>
          </>
        )}
      </div>
    </div>
  );
}

function ChecklistManager({ checklistData, setChecklistData }) {
  const [activeCategory, setActiveCategory] = useState(checklistData[0]?.category || '');
  const [renaming, setRenaming] = useState(false);
  const [renameDraft, setRenameDraft] = useState('');
  const [addingCat, setAddingCat] = useState(false);
  const [newCatDraft, setNewCatDraft] = useState('');
  const [newItemDraft, setNewItemDraft] = useState('');
  const [newItemRisk, setNewItemRisk] = useState('Medium');
  const newCatInputRef = useRef(null);
  const newItemInputRef = useRef(null);

  // Sync active category if data changes externally
  useEffect(() => {
    if (!checklistData.find(c => c.category === activeCategory)) {
      setActiveCategory(checklistData[0]?.category || '');
    }
  }, [checklistData]);

  const activeData = checklistData.find(c => c.category === activeCategory);
  const items = activeData?.items || [];
  const totalItems = checklistData.reduce((s, c) => s + c.items.length, 0);

  // Category operations
  const addCategory = () => {
    const name = newCatDraft.trim();
    if (!name || checklistData.find(c => c.category === name)) return;
    const updated = [...checklistData, { category: name, items: [] }];
    setChecklistData(updated);
    setActiveCategory(name);
    setNewCatDraft('');
    setAddingCat(false);
  };

  const renameCategory = () => {
    const name = renameDraft.trim();
    if (!name || (name !== activeCategory && checklistData.find(c => c.category === name))) return;
    setChecklistData(checklistData.map(c =>
      c.category === activeCategory ? { ...c, category: name } : c
    ));
    setActiveCategory(name);
    setRenaming(false);
  };

  const deleteCategory = () => {
    if (!confirm(`Delete category "${activeCategory}" and all its items? This cannot be undone.`)) return;
    const updated = checklistData.filter(c => c.category !== activeCategory);
    setChecklistData(updated);
    setActiveCategory(updated[0]?.category || '');
  };

  // Item operations
  const addItem = () => {
    const point = newItemDraft.trim();
    if (!point) return;
    const newItem = { id: `item-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`, point, risk: newItemRisk };
    setChecklistData(checklistData.map(c =>
      c.category === activeCategory ? { ...c, items: [...c.items, newItem] } : c
    ));
    setNewItemDraft('');
    setTimeout(() => newItemInputRef.current?.focus(), 0);
  };

  const editItem = (id, point) => {
    setChecklistData(checklistData.map(c =>
      c.category === activeCategory
        ? { ...c, items: c.items.map(it => it.id === id ? { ...it, point } : it) }
        : c
    ));
  };

  const deleteItem = (id) => {
    setChecklistData(checklistData.map(c =>
      c.category === activeCategory
        ? { ...c, items: c.items.filter(it => it.id !== id) }
        : c
    ));
  };

  const changeRisk = (id, risk) => {
    setChecklistData(checklistData.map(c =>
      c.category === activeCategory
        ? { ...c, items: c.items.map(it => it.id === id ? { ...it, risk } : it) }
        : c
    ));
  };

  return (
    <div className="cl-manager">
      {/* Toolbar */}
      <div className="cl-toolbar">
        <span className="cl-toolbar-label">Category</span>
        <select
          className="cl-select"
          value={activeCategory}
          onChange={e => { setRenaming(false); setActiveCategory(e.target.value); }}
        >
          {checklistData.map(c => (
            <option key={c.category} value={c.category}>{c.category} ({c.items.length})</option>
          ))}
        </select>

        {!addingCat ? (
          <button className="cl-add-cat-btn" onClick={() => { setAddingCat(true); setTimeout(() => newCatInputRef.current?.focus(), 0); }}>
            + Add category
          </button>
        ) : (
          <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
            <input
              ref={newCatInputRef}
              className="cl-rename-input"
              style={{ minWidth: 140, flex: 'none' }}
              placeholder="Category name…"
              value={newCatDraft}
              onChange={e => setNewCatDraft(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') addCategory(); if (e.key === 'Escape') { setAddingCat(false); setNewCatDraft(''); } }}
            />
            <button className="cl-save-btn" onClick={addCategory} disabled={!newCatDraft.trim()}>Add</button>
            <button className="cl-cancel-btn" onClick={() => { setAddingCat(false); setNewCatDraft(''); }}>Cancel</button>
          </div>
        )}

        {activeCategory && !addingCat && (
          <div className="cl-cat-actions">
            <button className="cl-cat-action-btn" onClick={() => { setRenameDraft(activeCategory); setRenaming(!renaming); }}>Rename</button>
            <button className="cl-cat-action-btn danger" onClick={deleteCategory}>Delete</button>
          </div>
        )}
      </div>

      {/* Rename row */}
      {renaming && (
        <div className="cl-rename-row">
          <span style={{ fontSize: 12, color: 'var(--accent)', fontWeight: 600 }}>Rename category:</span>
          <input
            className="cl-rename-input"
            value={renameDraft}
            onChange={e => setRenameDraft(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter') renameCategory(); if (e.key === 'Escape') setRenaming(false); }}
            autoFocus
          />
          <button className="cl-save-btn" onClick={renameCategory}>Save</button>
          <button className="cl-cancel-btn" onClick={() => setRenaming(false)}>Cancel</button>
        </div>
      )}

      {/* Items list */}
      <div className="cl-items">
        {items.length === 0 ? (
          <div className="cl-empty">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" style={{ color: 'var(--muted-2)' }}>
              <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
              <rect x="9" y="3" width="6" height="4" rx="1"/>
              <path d="M9 12h6M9 16h4"/>
            </svg>
            No checklist items yet. Add one below.
          </div>
        ) : items.map((item, i) => (
          <ChecklistItem
            key={item.id}
            item={item}
            index={i}
            onEdit={editItem}
            onDelete={deleteItem}
            onRiskChange={changeRisk}
          />
        ))}
      </div>

      {/* Add item row */}
      {activeCategory && (
        <div className="cl-add-item-row">
          <input
            ref={newItemInputRef}
            className="cl-add-input"
            placeholder={`Add checklist item to "${activeCategory}"…`}
            value={newItemDraft}
            onChange={e => setNewItemDraft(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter') addItem(); }}
          />
          <RiskBadge risk={newItemRisk} onChange={setNewItemRisk} />
          <button className="cl-add-confirm" onClick={addItem} disabled={!newItemDraft.trim()} title="Add item">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          </button>
        </div>
      )}

      {/* Footer */}
      <div className="cl-footer">
        <span className="cl-count">
          {items.length} item{items.length !== 1 ? 's' : ''} in this category · {totalItems} total across {checklistData.length} categories
        </span>
        <button className="link-btn" onClick={() => setChecklistData(DEFAULT_CHECKLIST_DATA)}>Reset to defaults</button>
      </div>
    </div>
  );
}

    <main className="page">
      <div className="page-head">
        <div>
          <h1>Bulk evaluate applications</h1>
          <p className="lede">

            <span className="muted"> Files are read in this browser session only — never uploaded to a server beyond the evaluation model.</span>

      </div>

      <div className="io-grid">
        <section className="card io-card">
          <div className="io-card-head">
            <div>
              <div className="io-card-eyebrow">Step 1</div>
              <h2>Checklist</h2>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 6 }}>
              <div className="io-meta"><span>{totalItems} criteria · {checklistData.length} categories</span></div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>

                <select
                  className="cl-select"
                  value={evalCategory}

                >
                  <option value="__all__">All categories</option>
                  {checklistData.map(c => (

            </div>

          <ChecklistManager checklistData={checklistData} setChecklistData={setChecklistData} />

          <div className="io-card-head">

            </svg>
            <div className="dz-title">Drop files here or click to browse</div>
            <div className="dz-sub">.txt · .md · .csv · .json · .pdf · .docx · .jpg/.jpeg — one document per file</div>
            <input ref={fileInput} type="file" multiple hidden
                   accept=".txt,.md,.csv,.tsv,.json,.log,.rtf,text/*,.pdf,.doc,.docx,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,.jpg,.jpeg,image/jpeg"

function DashboardView({ docs, summary, phase, thresholds, passBand, checklistLength, onSelectDoc, onBack }) {
  const [filter, setFilter] = useState('all'); // all | pass | fail | strong | conditional | reject | error
  const [sortBy, setSortBy] = useState('score'); // score | name | status
  const [sortDir, setSortDir] = useState('desc');
  const [search, setSearch] = useState('');

  const passPct = summary.total ? (summary.pass / summary.total) * 100 : 0;
  const completed = summary.strong + summary.conditional + summary.reject + summary.errored;
  const progressPct = summary.total ? (completed / summary.total) * 100 : 0;

  const filtered = useMemo(() => {
    let out = docs;
    if (search.trim()) {
      const q = search.toLowerCase();
      out = out.filter(d => d.applicantName.toLowerCase().includes(q) || d.name.toLowerCase().includes(q));
    }
    if (filter === 'pass')        out = out.filter(d => d.status === 'done' && (d.scored?.band === 'strong' || (passBand === 'conditional' && d.scored?.band === 'conditional')));
    else if (filter === 'fail')   out = out.filter(d => d.status === 'done' && d.scored?.band === 'reject' || (passBand === 'strong' && d.status === 'done' && d.scored?.band === 'conditional'));
    else if (filter === 'strong')      out = out.filter(d => d.scored?.band === 'strong');
    else if (filter === 'conditional') out = out.filter(d => d.scored?.band === 'conditional');
    else if (filter === 'reject')      out = out.filter(d => d.scored?.band === 'reject');
    else if (filter === 'error')       out = out.filter(d => d.status === 'error');
    return out;
  }, [docs, filter, search, passBand]);

  const sorted = useMemo(() => {
    const arr = filtered.slice();
    arr.sort((a, b) => {
      let cmp = 0;
      if (sortBy === 'score') {
        cmp = (a.scored?.pct ?? -1) - (b.scored?.pct ?? -1);
      } else if (sortBy === 'name') {
        cmp = a.applicantName.localeCompare(b.applicantName);
      } else if (sortBy === 'status') {
        const order = { strong: 3, conditional: 2, reject: 1, undefined: 0 };
        cmp = (order[a.scored?.band] ?? 0) - (order[b.scored?.band] ?? 0);
      }
      return sortDir === 'asc' ? cmp : -cmp;
    });
    return arr;
  }, [filtered, sortBy, sortDir]);

  const toggleSort = (key) => {
    if (sortBy === key) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortBy(key); setSortDir(key === 'name' ? 'asc' : 'desc'); }
  };

  return (
    <main className="page">
      <div className="report-head no-print">
        <div className="crumbs"><button className="link-btn" onClick={onBack}>← Back to documents</button></div>
        <div className="report-actions">
          <button className="ghost-btn" onClick={() => window.print()}>Export PDF</button>
        </div>
      </div>

      {/* Hero summary */}
      <section className="dash-hero card">
        <div className="hero-headline">
          <div className="eyebrow">Observation summary</div>
          <h1 className="big-number">
            <span className="passed">{summary.pass}</span>
            <span className="of">of</span>
            <span>{summary.total}</span>
          </h1>
          <div className="big-sub">
            files need not be sampled
            <span className="muted"> ({passPct.toFixed(0)}%)</span>
          </div>
          {phase === 'running' && (
            <div className="progress-row">
              <div className="progress"><div className="progress-fill" style={{ width: `${progressPct}%` }} /></div>
              <span className="progress-label">{completed} / {summary.total} processed</span>
            </div>
          )}
        </div>

        <div className="hero-bars">
          <BandBar label="Low risk"    count={summary.strong}      total={summary.total} color="#2E9461" />
          <BandBar label="Medium risk" count={summary.conditional} total={summary.total} color="#C28A1B" />
          <BandBar label="High risk"   count={summary.reject}      total={summary.total} color="#C04646" />
          {summary.errored > 0 && <BandBar label="Errored" count={summary.errored} total={summary.total} color="#9AA3B2" />}
          {summary.pending > 0 && <BandBar label="Pending" count={summary.pending} total={summary.total} color="#CBD0DA" />}
        </div>
      </section>

      {/* Pass / fail counts */}
      <section className="passfail">
        <div className="pf-card pf-pass">
          <div className="pf-num">{summary.strong}</div>
          <div className="pf-label">Cases passed</div>
          <div className="pf-sub">Low risk only</div>
        </div>
        <div className="pf-card pf-partial">
          <div className="pf-num">{summary.conditional}</div>
          <div className="pf-label">Cases partially</div>
          <div className="pf-sub">Medium risk · review advised</div>
        </div>
        <div className="pf-card pf-fail">
          <div className="pf-num">{summary.reject}</div>
          <div className="pf-label">Cases failed</div>
          <div className="pf-sub">High risk only</div>
        </div>
        <div className="pf-card pf-meta">
          <div className="pf-num">{checklistLength}</div>
          <div className="pf-label">Criteria checked</div>
          <div className="pf-sub">Per document</div>
        </div>
        <div className="pf-card pf-meta">
          <div className="pf-num">{thresholds.strong}<span style={{ fontSize: 18, color: 'var(--muted)' }}>%</span></div>
          <div className="pf-label">Threshold</div>
          <div className="pf-sub">Cases below threshold should be evaluated</div>
        </div>
      </section>

      {/* Filters */}
      <section className="card table-card">
        <div className="table-head">
          <div>
            <h2>All documents</h2>
            <p className="muted small">Click any row to see the per-criterion evaluation.</p>
          </div>
          <div className="table-tools">
            <input
              className="text-input search-input"
              placeholder="Search applicants…"
              value={search}
              onChange={e => setSearch(e.target.value)}
            />
            <div className="filter-seg compact">
              <button className={filter === 'all' ? 'on' : ''} onClick={() => setFilter('all')}>All <span className="seg-count">{summary.total}</span></button>
              <button className={filter === 'strong' ? 'on' : ''} onClick={() => setFilter('strong')}>Low risk <span className="seg-count">{summary.strong}</span></button>
              <button className={filter === 'conditional' ? 'on' : ''} onClick={() => setFilter('conditional')}>Medium risk <span className="seg-count">{summary.conditional}</span></button>
              <button className={filter === 'reject' ? 'on' : ''} onClick={() => setFilter('reject')}>High risk <span className="seg-count">{summary.reject}</span></button>
              {summary.errored > 0 && <button className={filter === 'error' ? 'on' : ''} onClick={() => setFilter('error')}>Errored <span className="seg-count">{summary.errored}</span></button>}
            </div>
          </div>
        </div>

        <div className="bulk-table">
          <div className="bulk-row bulk-head">
            <div className="b-i">#</div>
            <div className="b-name sortable" onClick={() => toggleSort('name')}>Applicant {sortBy === 'name' ? (sortDir === 'asc' ? '↑' : '↓') : ''}</div>
            <div className="b-status sortable" onClick={() => toggleSort('status')}>Status {sortBy === 'status' ? (sortDir === 'asc' ? '↑' : '↓') : ''}</div>
            <div className="b-score sortable" onClick={() => toggleSort('score')}>Score {sortBy === 'score' ? (sortDir === 'asc' ? '↑' : '↓') : ''}</div>
            <div className="b-bar">Criteria coverage</div>
            <div className="b-action"></div>
          </div>
          {sorted.length === 0 ? (
            <div className="empty-row">No documents match this filter.</div>
          ) : sorted.map((d, idx) => (
            <BulkRow key={d.id} doc={d} index={idx + 1} onClick={() => onSelectDoc(d.id)} />
          ))}
        </div>
      </section>
    </main>
  );
}

function BandBar({ label, count, total, color }) {
  const pct = total ? (count / total) * 100 : 0;
  return (
    <div className="band-bar-row">
      <div className="band-bar-label">
        <span className="band-dot" style={{ background: color }}></span>
        {label}
      </div>
      <div className="band-bar-track">
        <div className="band-bar-fill" style={{ width: `${pct}%`, background: color }} />
      </div>
      <div className="band-bar-count">{count}</div>
    </div>
  );
}

function BulkRow({ doc, index, onClick }) {
  const status = doc.status;
  if (status === 'queued' || status === 'running') {
    return (
      <div className="bulk-row" onClick={onClick}>
        <div className="b-i">{String(index).padStart(2, '0')}</div>
        <div className="b-name">
          <div className="bn-title">{doc.applicantName}</div>
          <div className="bn-sub">{doc.name}</div>
        </div>
        <div className="b-status"><BandPill band={status === 'running' ? 'pending' : 'pending'} /></div>
        <div className="b-score muted">—</div>
        <div className="b-bar">
          {status === 'running' ? <div className="mini-spinner" /> : <span className="muted small">Queued</span>}
        </div>
        <div className="b-action"></div>
      </div>
    );
  }
  if (status === 'error') {
    return (
      <div className="bulk-row error" onClick={onClick}>
        <div className="b-i">{String(index).padStart(2, '0')}</div>
        <div className="b-name"><div className="bn-title">{doc.applicantName}</div><div className="bn-sub">{doc.name}</div></div>
        <div className="b-status"><BandPill band="error" /></div>
        <div className="b-score muted">—</div>
        <div className="b-bar"><span className="error-msg-inline">{doc.error}</span></div>
        <div className="b-action">›</div>
      </div>
    );
  }
  // done
  const s = doc.scored;
  const c = s.counts;
  const total = s.total;
  const fp = (c.fully / total) * 100;
  const pp = (c.partially / total) * 100;
  const np = (c.not / total) * 100;
  const bandColor = s.band === 'strong' ? '#2E9461' : s.band === 'conditional' ? '#C28A1B' : '#C04646';

  return (
    <div className="bulk-row" onClick={onClick}>
      <div className="b-i" style={{ color: bandColor }}>{String(index).padStart(2, '0')}</div>
      <div className="b-name">
        <div className="bn-title">{doc.applicantName}</div>
        <div className="bn-sub">{doc.name}</div>
      </div>
      <div className="b-status"><BandPill band={s.band} /></div>
      <div className="b-score">
        <span className="score-num" style={{ color: bandColor }}>{s.pct.toFixed(0)}<span className="score-pct">%</span></span>
      </div>
      <div className="b-bar">
        <div className="mini-stack" title={`${c.fully} fully · ${c.partially} partially · ${c.not} not`}>
          <div style={{ width: `${fp}%`, background: '#2E9461' }} />
          <div style={{ width: `${pp}%`, background: '#C28A1B' }} />
          <div style={{ width: `${np}%`, background: '#C04646' }} />
        </div>
        <div className="mini-counts">
          <span style={{ color: '#2E9461' }}>{c.fully}</span>
          <span style={{ color: '#C28A1B' }}>{c.partially}</span>
          <span style={{ color: '#C04646' }}>{c.not}</span>
        </div>
      </div>
      <div className="b-action">›</div>
    </div>
  );
}

function DocDetail({ doc, onClose }) {
  const [activeRow, setActiveRow] = useState(null);
  const [filter, setFilter] = useState('all');

  const s = doc.scored;
  if (!s && doc.status !== 'error') {
    return (
      <div className="dive-overlay" onClick={onClose}>
        <div className="dive" onClick={e => e.stopPropagation()}>
          <div className="dive-head">
            <div><div className="eyebrow">{doc.applicantName}</div><h3>Evaluation in progress…</h3></div>
            <button className="ghost-btn" onClick={onClose}>Close</button>
          </div>
          <div style={{ padding: 40, textAlign: 'center', color: 'var(--muted)' }}>
            {doc.status === 'queued' ? 'Queued' : 'Processing…'}
          </div>
        </div>
      </div>
    );
  }
  if (doc.status === 'error') {
    return (
      <div className="dive-overlay" onClick={onClose}>
        <div className="dive" onClick={e => e.stopPropagation()}>
          <div className="dive-head">
            <div><div className="eyebrow">{doc.applicantName}</div><h3>Evaluation failed</h3></div>
            <button className="ghost-btn" onClick={onClose}>Close</button>
          </div>
          <div style={{ padding: 32 }}>
            <p className="error-msg">{doc.error}</p>
          </div>
        </div>
      </div>
    );
  }

  const bandColor = s.band === 'strong' ? '#2E9461' : s.band === 'conditional' ? '#C28A1B' : '#C04646';
  const filtered = filter === 'all' ? doc.results : doc.results.filter(r => r.status === filter);

  return (
    <div className="dive-overlay" onClick={onClose}>
      <div className="dive dive-wide" onClick={e => e.stopPropagation()}>
        <div className="dive-head">
          <div>
            <div className="eyebrow">Evaluation report</div>
            <h3>{doc.applicantName}</h3>
            <div className="hero-meta" style={{ marginTop: 4 }}>
              <span>{doc.name}</span>
              <span className="dotsep">·</span>
              <span>{s.total} criteria</span>
            </div>
          </div>
          <button className="ghost-btn" onClick={onClose}>Close</button>
        </div>

        <div className="detail-summary">
          <div className="detail-score" style={{ color: bandColor }}>
            <div className="ds-num">{s.pct.toFixed(0)}<span>%</span></div>
            <BandPill band={s.band} />
          </div>
          <div className="detail-counts">
            <Stat label="Pass"      value={s.counts.fully}     color="#2E9461" />
            <Stat label="Partially" value={s.counts.partially}  color="#C28A1B" />
            <Stat label="Failed"    value={s.counts.not}        color="#C04646" />
            <Stat label="Points"    value={`${s.points}/${s.max}`} />
          </div>
          <div className="detail-rec" style={{ borderColor: bandColor }}>
            <div className="rec-label" style={{ color: bandColor }}>Recommendation</div>
            <div className="rec-title">{s.recommendation}</div>
            <div className="rec-reasoning">{s.reasoning}</div>
          </div>
        </div>

        <div className="detail-filter">
          <div className="filter-seg compact">
            {[
              { k: 'all', n: doc.results.length, label: 'All' },
              { k: 'fully', n: s.counts.fully, label: 'Pass' },
              { k: 'partially', n: s.counts.partially, label: 'Partially' },
              { k: 'not', n: s.counts.not, label: 'Failed' },
            ].map(({ k, n, label }) => (
              <button key={k} className={filter === k ? 'on' : ''} onClick={() => setFilter(k)}>
                {label}<span className="seg-count">{n}</span>
              </button>
            ))}
          </div>
        </div>

        <div className="detail-table">
          <div className="eval-row eval-head">

          ))}
        </div>
      </div>
    </div>
  );
}

// File parsing (browser-only — confidential data never leaves session)
// ─────────────────────────────────────────────────────────────────────

const TEXT_EXT = ['txt','md','csv','tsv','json','log','rtf'];
const PDF_EXT  = ['pdf'];
const WORD_EXT = ['doc','docx'];
const IMG_EXT  = ['jpg','jpeg'];

// Lazy-load mammoth (Word) from CDN
let _mammoth = null;
async function getMammoth() {
  if (_mammoth) return _mammoth;
  await new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js';
    s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
  _mammoth = window.mammoth;
  return _mammoth;
}

// Lazy-load PDF.js from CDN
let _pdfjsLib = null;
async function getPdfJs() {
  if (_pdfjsLib) return _pdfjsLib;
  await new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
  const lib = window.pdfjsLib;
  lib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  _pdfjsLib = lib;
  return lib;
}

function readAsArrayBuffer(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result);
    r.onerror = () => rej(new Error('FileReader error'));
    r.readAsArrayBuffer(file);
  });
}

function readAsDataURL(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result);
    r.onerror = () => rej(new Error('FileReader error'));
    r.readAsDataURL(file);
  });
}

async function parsePdf(file) {
  const lib = await getPdfJs();
  const buf = await readAsArrayBuffer(file);
  const pdf = await lib.getDocument({ data: buf }).promise;
  const parts = [];
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    parts.push(content.items.map(it => it.str).join(' '));
  }
  return parts.join('\n\n');
}

async function parseDocx(file) {
  const m = await getMammoth();
  const buf = await readAsArrayBuffer(file);
  const result = await m.extractRawText({ arrayBuffer: buf });
  return result.value;
}

async function parseJpg(file) {
  // Convert image to base64 and send to Claude API for OCR/description
  const dataUrl = await readAsDataURL(file);
  const base64  = dataUrl.split(',')[1];
  const mediaType = 'image/jpeg';

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 2048,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
          { type: 'text',  text: 'Extract and transcribe all text visible in this document image. Return only the extracted text, preserving structure as much as possible.' }
        ]
      }]
    })
  });
  if (!response.ok) throw new Error(`Image OCR failed (${response.status})`);
  const data = await response.json();
  return (data.content || []).map(b => b.text || '').join('');
}

async function parseFile(file) {
  const name = file.name;
  const ext = (name.split('.').pop() || '').toLowerCase();

  if (TEXT_EXT.includes(ext) || file.type.startsWith('text/')) {
    return await file.text();
  }
  if (PDF_EXT.includes(ext) || file.type === 'application/pdf') {
    return await parsePdf(file);
  }
  if (WORD_EXT.includes(ext) ||
      file.type === 'application/msword' ||
      file.type === 'application/vnd.openxmlformats-officedocument.wordprocessingml.document') {
    return await parseDocx(file);
  }
  if (IMG_EXT.includes(ext) || file.type === 'image/jpeg') {
    return await parseJpg(file);
  }

  // Best-effort plain-text fallback
  try {
    const text = await file.text();
    const printable = (text.match(/[\x20-\x7E\n\r\t]/g) || []).length;
    if (printable / text.length > 0.85) return text;
  } catch (_) {}
  throw new Error(`${name}: unsupported format. Use .txt, .md, .csv, .json, .pdf, .docx, or .jpg/.jpeg.`);
}

function extractApplicantName(text, fallback) {
  if (!text) return fallback;
  const m = text.match(/APPLICANT(?:\s*NAME)?\s*[:\-]\s*([^\n\r]{2,80})/i)
        || text.match(/COMPANY\s*[:\-]\s*([^\n\r]{2,80})/i)
        || text.match(/BORROWER\s*[:\-]\s*([^\n\r]{2,80})/i);
  if (m) return m[1].trim();
  return fallback;
}

function buildPrompt(checklist, document) {
  const items = checklist
    .split(/\n+/)
    .map(l => l.trim())
    .filter(Boolean)
    .map(l => l.replace(/^(\d+[.)]|[-•*])\s*/, ''));

  const numbered = items.map((c, i) => `${i + 1}. ${c}`).join('\n');

  return {
    items,
    prompt: `You are an objective credit analyst evaluating an Enterprise Development Loan (EDL) application against a checklist. Judge ONLY from the document — do not assume facts not present.

CHECKLIST (${items.length} items):
${numbered}

APPLICANT DOCUMENT:
"""
${document}
"""

For EACH checklist item, return a JSON object with:
- "i": 1-based index of the criterion
- "status": one of "fully", "partially", "not"
  - "fully" = clearly and completely satisfied with specific evidence
  - "partially" = some evidence but missing detail or only loosely addressed
  - "not" = absent, contradicted, or insufficient evidence
- "evidence": a short verbatim quote or precise reference (max 200 chars). "" if none.
- "remarks": one concise sentence (max 220 chars).

Return ONLY a JSON array with exactly ${items.length} objects, in order. No prose, no markdown fences.`
  };
}

// ─────────────────────────────────────────────────────────────────────
// Keyword-based evaluator (runs entirely in the browser, no API needed)
// Each rule looks for "strong" signals (=> fully) and "weak" signals (=> partially)
// Falls back to "not" if neither is found. Pulls a verbatim line as evidence.
// ─────────────────────────────────────────────────────────────────────

const RULES = [
  {
    match: /operat|trading|since|years?\s+(of\s+)?(trading|operation)|established/i,
    strong: [
      { re: /operating\s+since[^\n]*?(20[0-2]\d)/i, check: m => (new Date().getFullYear() - parseInt(m[1], 10)) >= 2 },
      { re: /(\d+)\s+years?\s+(of\s+)?(trading|operation|history)/i, check: m => parseInt(m[1], 10) >= 2 },
    ],
    weak: [/operating\s+since/i, /trading\s+history/i],
  },
  {
    match: /turnover|revenue/i,
    strong: [
      { re: /turnover[^\n]*?USD\s*([\d,]+)/i, check: m => {
          const n = parseInt(m[1].replace(/,/g, ''), 10);
          return n >= 250000 && n <= 5000000;
      } },
    ],
    weak: [/turnover[^\n]*?USD/i, /revenue[^\n]*?USD/i],
  },
  {
    match: /audit|financial\s+statement|management[\s-]prepared/i,
    strong: [/audited\s+statements?:?\s*yes/i, /independent\s+auditor/i, /audited.*FY\d{4}.*FY\d{4}/i],
    weak: [/management[\s-]prepared/i, /financial\s+statements?/i],
  },
  {
    match: /profit|margin/i,
    strong: [
      { re: /margin\s*([\d.]+)%/i, check: m => parseFloat(m[1]) > 0 },
      { re: /net\s+profit[^\n]*?USD\s*([\d,]+)/i, check: m => parseInt(m[1].replace(/,/g, ''), 10) > 0 },
    ],
    weak: [/profit/i, /margin/i],
  },
  {
    match: /debt[\s-]to[\s-]equity|d\/e|gearing/i,
    strong: [
      { re: /debt[\s-]to[\s-]equity:?\s*([\d.]+)x?/i, check: m => parseFloat(m[1]) < 2.0 },
    ],
    weak: [/debt[\s-]to[\s-]equity/i],
  },
  {
    match: /loan|purpose|capex|working\s+capital|expansion/i,
    strong: [/purpose:[^\n]*?(capex|expansion|working\s+capital)/i, /loan\s+request[^\n]*?(capex|expansion|working\s+capital)/i],
    weak: [/loan\s+request/i, /purpose:?[^\n]*business/i],
  },
  {
    match: /dscr|debt\s+service|repayment|cash[\s-]flow/i,
    strong: [
      { re: /dscr:?\s*([\d.]+)x?/i, check: m => parseFloat(m[1]) >= 1.25 },
      /cash[\s-]flow\s+forecast\s+attached/i,
    ],
    weak: [/repayment/i, /tenor/i, /dscr/i],
  },
  {
    match: /collateral|security|charge|valuation/i,
    strong: [/collateral:[^\n]*?(valuation|charge)[^\n]*?USD\s*[\d,]+/i, /independent\s+valuation/i],
    weak: [/collateral/i, /security/i, /equipment\s+offered/i],
  },
  {
    match: /kyc|director|id\b|proof\s+of\s+address|tax\s+(registration|pin)/i,
    strong: [/KYC:[^\n]*?ID[^\n]*?(utility|address)[^\n]*?tax/i, /director[^\n]*?ID[^\n]*?utility[^\n]*?tax/i],
    weak: [/director[^\n]*?ID/i, /KYC/i],
  },
  {
    match: /credit|crb|default|judgement|restructur/i,
    strong: [/CRB\s+clean/i, /no\s+defaults?\s+or\s+restructur/i, /credit\s+history:[^\n]*?clean/i],
    weak: [/restructured\s+facility/i, /credit\s+history/i],
  },
  {
    match: /licens|regulat|compliant/i,
    strong: [/licen[cs]es?\s+current\s+and\s+valid/i, /all\s+sector\s+licen[cs]es/i, /regulatory:[^\n]*?valid/i],
    weak: [/licen[cs]ing:?\s*current/i, /licen[cs]ing/i],
  },
  {
    match: /esg|environment|social|jobs|employ|community|renewable/i,
    strong: [/employs\s+\d+\s+people/i, /community\s+sourcing/i, /renewable\s+energy/i, /ESG:[^\n]*?(employ|community|renewable)/i],
    weak: [/ESG/i, /social\s+impact/i],
  },
];

function tokenize(criterion) {
  return criterion.toLowerCase().match(/[a-z][a-z0-9]+/g) || [];
}

function pickRule(criterion) {
  // Find first rule whose match regex hits the criterion text
  for (const r of RULES) if (r.match.test(criterion)) return r;
  return null;
}

function findEvidence(text, patterns) {
  for (const p of patterns) {
    const re = p instanceof RegExp ? p : p.re;
    const m = text.match(re);
    if (m) {
      // Return the matched line (verbatim quote)
      const line = (text.split(/\n/).find(l => re.test(l)) || m[0]).trim();
      return line.slice(0, 200);
    }
  }
  return '';
}

function checkRule(rule, text) {
  // Strong patterns can have a check() that validates extracted values
  for (const p of rule.strong) {
    if (p instanceof RegExp) {
      if (p.test(text)) return { status: 'fully', pattern: p };
    } else {
      const m = text.match(p.re);
      if (m && p.check(m)) return { status: 'fully', pattern: p.re };
    }
  }
  for (const p of rule.weak) {
    const re = p instanceof RegExp ? p : p.re;
    if (re.test(text)) return { status: 'partially', pattern: re };
  }
  return { status: 'not', pattern: null };
}

function fallbackKeywordScan(criterion, text) {
  // For criteria not covered by RULES — match nouns from the criterion against the document
  const tokens = tokenize(criterion).filter(t => t.length > 4 && !['shall','must','should','where','their','which','these','those'].includes(t));
  if (!tokens.length) return { status: 'not', evidence: '' };
  const lowerText = text.toLowerCase();
  const hits = tokens.filter(t => lowerText.includes(t));
  if (hits.length >= Math.ceil(tokens.length * 0.6)) {
    const re = new RegExp(`[^\\n]*${hits[0]}[^\\n]*`, 'i');
    const m = text.match(re);
    return { status: 'partially', evidence: (m?.[0] || '').trim().slice(0, 200) };
  }
  return { status: 'not', evidence: '' };
}

function explainStatus(criterion, status) {
  const short = criterion.length > 80 ? criterion.slice(0, 77) + '...' : criterion;
  if (status === 'fully') return `Document provides clear evidence for: ${short}`;
  if (status === 'partially') return `Some indication present but evidence is incomplete or unverified.`;
  return `No evidence found in the document for this criterion.`;
}

async function evaluateOne(checklist, document) {
  const { items } = buildPrompt(checklist, document);
  // Simulate a small async delay so the UI shows queued -> running -> done transitions
  await new Promise(r => setTimeout(r, 80 + Math.random() * 220));

  return items.map((criterion, idx) => {
    const rule = pickRule(criterion);
    let status, evidence;
    if (rule) {
      const res = checkRule(rule, document);
      status = res.status;
      evidence = res.pattern ? findEvidence(document, [res.pattern]) : '';
      if (!evidence && status !== 'not') {
        evidence = findEvidence(document, [...rule.strong, ...rule.weak]);
      }
    } else {
      const fb = fallbackKeywordScan(criterion, document);
      status = fb.status;
      evidence = fb.evidence;
    }
    return {
      i: idx + 1,
      criterion,
      status,
      evidence,
      remarks: explainStatus(criterion, status),
    };
  });
}

// Run evaluations in parallel pools
async function evaluateBatch(checklist, docs, { concurrency = 3, onUpdate } = {}) {
  const queue = docs.map((d, idx) => ({ d, idx }));
  const results = new Array(docs.length).fill(null);
  let active = 0, next = 0;

  return new Promise((resolve) => {
    const pump = () => {
      while (active < concurrency && next < queue.length) {
        const { d, idx } = queue[next++];
        active++;
        onUpdate?.(idx, { status: 'running' });
        evaluateOne(checklist, d.text)
          .then(r => {
            results[idx] = { ok: true, results: r };
            onUpdate?.(idx, { status: 'done', results: r });
          })
          .catch(e => {
            results[idx] = { ok: false, error: e?.message || String(e) };
            onUpdate?.(idx, { status: 'error', error: e?.message || String(e) });
          })
          .finally(() => {
            active--;
            if (next >= queue.length && active === 0) resolve(results);
            else pump();
          });
      }
    };
    pump();
    if (queue.length === 0) resolve(results);
  });
}

// ─────────────────────────────────────────────────────────────────────
// Scoring
// ─────────────────────────────────────────────────────────────────────

function scoreResults(results, thresholds) {
  const total = results.length;
  const counts = { fully: 0, partially: 0, not: 0 };
  results.forEach(r => { counts[r.status]++; });
  const points = counts.fully * 2 + counts.partially * 1;
  const max = total * 2;
  const pct = max ? (points / max) * 100 : 0;
  let band, recommendation, reasoning;
  if (pct >= thresholds.strong) {
    band = 'strong';
    recommendation = 'File Need Not Be Sampled';
    reasoning = `File is above the threshold limit and need not be audited.`;
  } else if (pct >= thresholds.conditional) {
    band = 'conditional';
    recommendation = 'Observation Exists — File Below Threshold';
    reasoning = `File is below the threshold limit and needs to be audited.`;
  } else {
    band = 'reject';
    recommendation = 'Case Needs to Be Sampled';
    reasoning = `File is below the threshold limit and needs to be audited.`;
  }
  return { total, counts, points, max, pct, band, recommendation, reasoning };
}
